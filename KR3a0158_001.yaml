body:
  text: 太元經怒如烈風喜如溫春馬總意林卷五鸞雛鳳子養甡高峙隱耀深林不食滓穢同上內清外濁斃衣裏玉同上十里九坎牛馬低昂同上天氣左轉星辰右行陰陽運度報返相迎同上強梁者亡掘強者折大健者跋大利者缺同上激氣成風湧氣成雨濁霧成雪清露成霜同上紫霓圍日其疾不割太平御覽卷十四明珠彈於飛寅甘不棲太平御覽卷三百五十引太元經案揚子雲太元經唐上九明珠彈於飛肉其得不復肉與復叶韻此則飛與棲叶韻蓋泉襲雄語而微變其文也寅甘二字義不可解案寅甘當作夤其許慎説文解字引易夕惕作夕夤夤與惕義相近悚懼不安之意甘則其字之訛也老子行則滅迹立則隱形太平御覽卷三百八十八鸞鳳不遷甘於竹實騶虞不移於生物醜婦以明鏡為害無所逃陋並太平御覽卷九百十五原作一節文義不屬今分為二節雞鳴晨雄雌宛頭隨後墮井河伯徐州太平御覽卷九百十八素纓之鴨翰音之雞望視之兔白蹄之豕短喙之狗修頸之馬君子之貌何獨異耶太平御覽卷九百十九
